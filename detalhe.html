<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Detalhes do Treino</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4" id="detalhes"></div>

<script>

const API = "http://localhost:3000/planos";

// PEGAR ID DA URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// PEGAR USUÁRIO LOGADO
function getUser() {
  return JSON.parse(sessionStorage.getItem("usuario"));
}

// CARREGAR DETALHES
async function carregarDetalhes() {

  const res = await fetch(`${API}/${id}`);
  const item = await res.json();

  const user = getUser();

  let favorito = false;

  // verificar favorito (se existir lista no usuário)
  if (user?.favoritos?.includes(item.id)) {
    favorito = true;
  }

  document.getElementById("detalhes").innerHTML = `
  
    <div class="card p-3">

      <img src="${item.imagem}" class="img-fluid mb-3">

      <h2>${item.nome}</h2>
      <p>${item.descricao}</p>

      <button class="btn ${favorito ? "btn-danger" : "btn-outline-danger"}"
        onclick="toggleFavorito(${item.id})">

        ${favorito ? "❤️ Favoritado" : "🤍 Favoritar"}
      </button>

    </div>
  
  `;
}

// FAVORITOS
async function toggleFavorito(idItem) {

  let user = getUser();

  if (!user) {
    alert("Faça login primeiro");
    return;
  }

  if (!user.favoritos) {
    user.favoritos = [];
  }

  if (user.favoritos.includes(idItem)) {
    user.favoritos = user.favoritos.filter(f => f !== idItem);
  } else {
    user.favoritos.push(idItem);
  }

  // atualizar no JSONServer
  await fetch(`http://localhost:3000/usuarios/${user.id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(user)
  });

  sessionStorage.setItem("usuario", JSON.stringify(user));

  carregarDetalhes();
}

carregarDetalhes();

</script>

</body>
</html>
