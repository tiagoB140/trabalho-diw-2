<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width: 500px;">

  <h2 class="text-center mb-4">Cadastro de Usuário</h2>

  <div class="card p-4 shadow">

    <input id="nome" class="form-control mb-3" placeholder="Nome">
    <input id="email" class="form-control mb-3" placeholder="Email">
    <input id="login" class="form-control mb-3" placeholder="Login">
    <input id="senha" type="password" class="form-control mb-3" placeholder="Senha">

    <button class="btn btn-success w-100" onclick="cadastrarUsuario()">
      Cadastrar
    </button>

    <p class="text-center mt-3">
      Já tem conta? <a href="login.html">Fazer login</a>
    </p>

  </div>

</div>

<script>
const API = "http://localhost:3000";

async function cadastrarUsuario() {
  const nome = document.getElementById("nome").value;
  const email = document.getElementById("email").value;
  const login = document.getElementById("login").value;
  const senha = document.getElementById("senha").value;

  // validação completa
  if (!nome || !email || !login || !senha) {
    alert("Preencha todos os campos");
    return;
  }

  const usuario = {
    nome,
    email,
    login,
    senha,
    admin: false
  };

  try {
    const res = await fetch(`${API}/usuarios`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(usuario)
    });

    if (!res.ok) {
      throw new Error("Erro ao cadastrar");
    }

    alert("Usuário cadastrado com sucesso!");
    window.location.href = "login.html";

  } catch (error) {
    console.error(error);
    alert("Erro ao conectar com o servidor");
  }
}
</script>

</body>
</html>
