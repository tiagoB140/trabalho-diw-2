<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Painel Admin - PowerFit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

  <h2 class="mb-4">⚙️ Painel Administrativo</h2>

  <!-- ABAS -->
  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
      <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#itens">
        📋 Itens (Treinos)
      </button>
    </li>

    <li class="nav-item">
      <button class="nav-link" data-bs-toggle="tab" data-bs-target="#usuarios">
        👤 Usuários
      </button>
    </li>
  </ul>

  <div class="tab-content">

    <!-- ===================== ITENS ===================== -->
    <div class="tab-pane fade show active" id="itens">

      <div class="card p-3 mb-3">

        <input id="item-id" class="form-control mb-2" placeholder="ID (editar)">
        <input id="item-nome" class="form-control mb-2" placeholder="Nome">
        <input id="item-descricao" class="form-control mb-2" placeholder="Descrição">
        <input id="item-imagem" class="form-control mb-2" placeholder="Imagem URL">

        <button class="btn btn-success" onclick="salvarItem()">Salvar Item</button>

      </div>

      <div id="lista-itens"></div>

    </div>

    <!-- ===================== USUÁRIOS ===================== -->
    <div class="tab-pane fade" id="usuarios">

      <div class="card p-3 mb-3">

        <input id="user-id" class="form-control mb-2" placeholder="ID (editar)">
        <input id="user-nome" class="form-control mb-2" placeholder="Nome">
        <input id="user-login" class="form-control mb-2" placeholder="Login">
        <input id="user-senha" class="form-control mb-2" placeholder="Senha">
        <input id="user-email" class="form-control mb-2" placeholder="Email">

        <div class="form-check mb-2">
          <input type="checkbox" id="user-admin" class="form-check-input">
          <label class="form-check-label">Administrador</label>
        </div>

        <button class="btn btn-success" onclick="salvarUsuario()">Salvar Usuário</button>

      </div>

      <div id="lista-usuarios"></div>

    </div>

  </div>

</div>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>

/* ===================== API ===================== */
const API_PLANOS = "http://localhost:3000/planos";
const API_USUARIOS = "http://localhost:3000/usuarios";

/* ===================== ITENS ===================== */

// LISTAR ITENS
async function listarItens() {
  const res = await fetch(API_PLANOS);
  const dados = await res.json();

  const lista = document.getElementById("lista-itens");
  lista.innerHTML = "";

  dados.forEach(item => {
    lista.innerHTML += `
      <div class="card p-2 mb-2">

        <h5>${item.nome}</h5>
        <p>${item.descricao}</p>

        <button class="btn btn-warning btn-sm" onclick='editarItem(${JSON.stringify(item)})'>
          Editar
        </button>

        <button class="btn btn-danger btn-sm" onclick="deletarItem(${item.id})">
          Excluir
        </button>

      </div>
    `;
  });
}

// SALVAR ITEM
async function salvarItem() {

  const id = document.getElementById("item-id").value;

  const item = {
    nome: document.getElementById("item-nome").value,
    descricao: document.getElementById("item-descricao").value,
    imagem: document.getElementById("item-imagem").value
  };

  if (id) {
    await fetch(`${API_PLANOS}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(item)
    });
  } else {
    await fetch(API_PLANOS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(item)
    });
  }

  limparItem();
  listarItens();
}

// EDITAR ITEM
function editarItem(item) {
  document.getElementById("item-id").value = item.id;
  document.getElementById("item-nome").value = item.nome;
  document.getElementById("item-descricao").value = item.descricao;
  document.getElementById("item-imagem").value = item.imagem;
}

// DELETAR ITEM
async function deletarItem(id) {
  await fetch(`${API_PLANOS}/${id}`, { method: "DELETE" });
  listarItens();
}

// LIMPAR ITEM
function limparItem() {
  document.getElementById("item-id").value = "";
  document.getElementById("item-nome").value = "";
  document.getElementById("item-descricao").value = "";
  document.getElementById("item-imagem").value = "";
}


/* ===================== USUÁRIOS ===================== */

// LISTAR USUÁRIOS
async function listarUsuarios() {
  const res = await fetch(API_USUARIOS);
  const dados = await res.json();

  const lista = document.getElementById("lista-usuarios");
  lista.innerHTML = "";

  dados.forEach(u => {
    lista.innerHTML += `
      <div class="card p-2 mb-2">

        <h5>${u.nome}</h5>
        <p>${u.email}</p>
        <p>Login: ${u.login}</p>
        <p>Admin: ${u.admin}</p>

        <button class="btn btn-warning btn-sm" onclick='editarUsuario(${JSON.stringify(u)})'>
          Editar
        </button>

        <button class="btn btn-danger btn-sm" onclick="deletarUsuario(${u.id})">
          Excluir
        </button>

      </div>
    `;
  });
}

// SALVAR USUÁRIO
async function salvarUsuario() {

  const id = document.getElementById("user-id").value;

  const user = {
    nome: document.getElementById("user-nome").value,
    login: document.getElementById("user-login").value,
    senha: document.getElementById("user-senha").value,
    email: document.getElementById("user-email").value,
    admin: document.getElementById("user-admin").checked
  };

  if (id) {
    await fetch(`${API_USUARIOS}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(user)
    });
  } else {
    await fetch(API_USUARIOS, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(user)
    });
  }

  limparUsuario();
  listarUsuarios();
}

// EDITAR USUÁRIO
function editarUsuario(u) {
  document.getElementById("user-id").value = u.id;
  document.getElementById("user-nome").value = u.nome;
  document.getElementById("user-login").value = u.login;
  document.getElementById("user-senha").value = u.senha;
  document.getElementById("user-email").value = u.email;
  document.getElementById("user-admin").checked = u.admin;
}

// DELETAR USUÁRIO
async function deletarUsuario(id) {
  await fetch(`${API_USUARIOS}/${id}`, { method: "DELETE" });
  listarUsuarios();
}

// LIMPAR USUÁRIO
function limparUsuario() {
  document.getElementById("user-id").value = "";
  document.getElementById("user-nome").value = "";
  document.getElementById("user-login").value = "";
  document.getElementById("user-senha").value = "";
  document.getElementById("user-email").value = "";
  document.getElementById("user-admin").checked = false;
}

/* ===================== INIT ===================== */
listarItens();
listarUsuarios();

</script>

</body>
</html>
